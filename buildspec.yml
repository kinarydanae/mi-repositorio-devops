version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - pip install -r app/requirements.txt
      - pip install pytest
  build:
    commands:
      - echo "Ejecutando pruebas"
      - pytest tests/
  post_build:
    commands:
      - echo "Construcción finalizada con éxito"